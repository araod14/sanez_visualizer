services:
  app:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - ./sanez.db:/app/sanez.db
      - ./static/uploads:/app/static/uploads
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SECRET_KEY=${SECRET_KEY:-}
    restart: unless-stopped
