<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Panel — Acceso Admin</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f9fafb;
    }

    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 1rem;
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #e0c97f;
    }

    .subtitulo {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #d1d5db;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      color: #f9fafb;
      font-size: 0.95rem;
      margin-bottom: 1.2rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #e0c97f;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #e0c97f;
      color: #111827;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      background: #f0d98a;
    }

    .error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      padding: 0.65rem 0.9rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Visual Panel</h1>
    <p class="subtitulo">Panel de administración</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="usuario">Email</label>
      <input type="text" id="usuario" name="usuario" autofocus autocomplete="username" required>

      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" name="contrasena" autocomplete="current-password" required>

      <button type="submit">Ingresar</button>
    </form>
  </div>
</body>
</html>
