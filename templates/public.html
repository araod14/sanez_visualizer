<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ nombre_negocio }} — Menú</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0a0a0a;
      cursor: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Capas de fondo ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-capa {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.4s ease-in-out;
    }

    /* Viñeta suave: oscurece bordes para resaltar el contenido centrado */
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 90% 85% at 50% 50%,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.65) 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* ── Overlay centrado con contenido ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vw 5vw;
      transition: opacity 0.65s ease-in-out;
    }

    /* Panel contenedor: por defecto transparente; los estilos claros lo pintan */
    #panel {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-height: 92vh;
    }

    /* Título de la categoría activa (base) */
    #cat-titulo {
      font-size: clamp(2.2rem, 6.5vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #e0c97f;
      text-shadow:
        0 4px 24px rgba(0,0,0,0.95),
        0 0  50px rgba(0,0,0,0.6);
      margin-bottom: clamp(8px, 1.5vh, 20px);
      text-align: center;
    }

    /* Separador decorativo (base) */
    #cat-sep {
      width: clamp(60px, 10vw, 160px);
      height: 3px;
      background: linear-gradient(to right, transparent, #e0c97f, transparent);
      margin-bottom: clamp(14px, 2.8vh, 42px);
      border-radius: 2px;
    }

    /* Grid de productos (base) */
    #productos-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: clamp(10px, 1.8vw, 26px);
      width: 100%;
      overflow: hidden;
    }

    /* Sin productos en la categoría activa */
    #cat-vacia {
      color: rgba(255,255,255,0.3);
      font-size: clamp(0.9rem, 2vw, 1.8rem);
      font-style: italic;
      letter-spacing: 0.06em;
    }

    /* ════════════════════════════════════════════════════════════════
       ESTILO 1 — Restaurante clásico
       ════════════════════════════════════════════════════════════════ */
    #overlay.estilo_1 #cat-titulo {
      color: #c9a84c;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    #overlay.estilo_1 #cat-sep {
      background: linear-gradient(to right, transparent, #c9a84c, transparent);
    }
    #overlay.estilo_1 #productos-grid {
      flex-direction: column;
      gap: clamp(6px, 1.4vh, 16px);
      max-width: 1000px;
      margin: 0 auto;
    }
    .e1-row {
      display: flex;
      align-items: baseline;
      width: 100%;
      gap: 0.6rem;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    .e1-nombre {
      color: #ece3cf;
      font-size: clamp(1rem, 2.6vw, 2.4rem);
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      white-space: nowrap;
    }
    .e1-dots {
      flex: 1;
      border-bottom: 2px dotted rgba(201,168,76,0.55);
      transform: translateY(-0.35em);
    }
    .e1-precio {
      color: #c9a84c;
      font-size: clamp(1rem, 2.8vw, 2.6rem);
      font-weight: 700;
      white-space: nowrap;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    }
    .e1-precio .bss { color: #ece3cf; font-size: 0.6em; margin-left: 0.4em; opacity: 0.85; }

    /* ════════════════════════════════════════════════════════════════
       ESTILO 2 — Tarjetas oscuras
       ════════════════════════════════════════════════════════════════ */
    #overlay.estilo_2 #cat-titulo { color: #e0c97f; font-weight: 900; }
    #overlay.estilo_2 #cat-sep {
      background: linear-gradient(to right, transparent, #e0c97f, transparent);
    }
    #overlay.estilo_2 #productos-grid {
      gap: clamp(10px, 1.6vw, 22px);
    }
    .e2-card {
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: clamp(10px, 1.1vw, 18px);
      padding: clamp(12px, 2vh, 28px) clamp(16px, 2.4vw, 40px);
      text-align: center;
      min-width: clamp(130px, 14vw, 220px);
    }
    .e2-nombre {
      color: #b8b8b8;
      font-size: clamp(0.8rem, 1.6vw, 1.5rem);
      font-weight: 500;
      margin-bottom: 0.4em;
      white-space: nowrap;
    }
    .e2-precio {
      color: #fff;
      font-size: clamp(1.6rem, 4vw, 4.6rem);
      font-weight: 900;
      line-height: 1;
    }
    .e2-precio .sym { font-size: 0.5em; font-weight: 600; opacity: 0.7; vertical-align: super; margin-right: 0.08em; }
    .e2-bss { color: rgba(255,255,255,0.85); font-size: clamp(0.9rem, 1.9vw, 2rem); font-weight: 700; margin-top: 0.2em; }

    /* ════════════════════════════════════════════════════════════════
       ESTILO 3 — Carta de pizzería
       ════════════════════════════════════════════════════════════════ */
    #overlay.estilo_3 #panel {
      background: rgba(252, 249, 242, 0.94);
      border-radius: 14px;
      padding: clamp(20px, 3.5vh, 50px) clamp(22px, 4vw, 64px);
      box-shadow: 0 20px 70px rgba(0,0,0,0.55);
      max-width: 1100px;
    }
    #overlay.estilo_3 #cat-titulo {
      color: #b91c1c;
      font-family: 'Georgia', serif;
      font-style: italic;
      letter-spacing: 0.05em;
    }
    #overlay.estilo_3 #cat-sep { display: none !important; }
    #overlay.estilo_3 #productos-grid {
      flex-direction: column;
      gap: 0;
      max-width: 980px;
      margin: 0 auto;
    }
    #overlay.estilo_3 #cat-vacia { color: #999; }
    .e3-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      width: 100%;
      padding: clamp(8px, 1.4vh, 16px) 0;
      border-bottom: 1px solid rgba(0,0,0,0.12);
      font-family: 'Georgia', serif;
    }
    .e3-left { display: flex; align-items: baseline; gap: 0.7rem; min-width: 0; }
    .e3-num {
      color: #b91c1c;
      font-size: clamp(1.3rem, 3vw, 2.6rem);
      font-weight: 800;
      line-height: 1;
    }
    .e3-nombre {
      color: #b91c1c;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(1rem, 2.3vw, 2rem);
    }
    .e3-desc {
      color: #555;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(0.7rem, 1.3vw, 1.05rem);
      margin-top: 0.15em;
      line-height: 1.25;
    }
    .e3-right { display: flex; gap: clamp(0.5rem, 1.4vw, 1.6rem); align-items: flex-end; flex-shrink: 0; }
    .e3-size { text-align: center; }
    .e3-size-label { display: block; color: #888; font-size: clamp(0.6rem, 1vw, 0.85rem); text-transform: uppercase; letter-spacing: 0.05em; }
    .e3-size-precio { color: #b91c1c; font-weight: 700; font-size: clamp(1rem, 2.1vw, 1.9rem); }
    .e3-precio { color: #b91c1c; font-weight: 800; font-size: clamp(1.2rem, 2.6vw, 2.3rem); }

    /* ════════════════════════════════════════════════════════════════
       ESTILO 4 — Bar nocturno / neón
       ════════════════════════════════════════════════════════════════ */
    #overlay.estilo_4 { background: rgba(10, 10, 18, 0.55); }
    #overlay.estilo_4 #cat-titulo {
      color: #a855f7;
      text-shadow: 0 0 24px rgba(168,85,247,0.7), 0 4px 20px rgba(0,0,0,0.9);
    }
    #overlay.estilo_4 #cat-sep {
      background: linear-gradient(to right, transparent, #a855f7, transparent);
      box-shadow: 0 0 12px rgba(168,85,247,0.8);
    }
    #overlay.estilo_4 #productos-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(10px, 1.6vw, 22px);
      max-width: 1100px;
      margin: 0 auto;
    }
    .e4-card {
      background: #13131f;
      border: 1px solid rgba(168,85,247,0.45);
      border-radius: 14px;
      padding: clamp(12px, 2vh, 26px) clamp(16px, 2.4vw, 36px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      box-shadow: 0 0 18px rgba(168,85,247,0.12);
    }
    .e4-nombre {
      color: #c084fc;
      font-size: clamp(0.9rem, 1.8vw, 1.7rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .e4-precio-wrap { text-align: right; }
    .e4-precio {
      color: #fff;
      font-size: clamp(1.5rem, 3.4vw, 3.6rem);
      font-weight: 900;
      line-height: 1;
    }
    .e4-precio .sym { font-size: 0.5em; opacity: 0.7; vertical-align: super; margin-right: 0.06em; }
    .e4-bss { color: rgba(192,132,252,0.9); font-size: clamp(0.85rem, 1.6vw, 1.5rem); font-weight: 700; margin-top: 0.2em; }

    /* ════════════════════════════════════════════════════════════════
       ESTILO 5 — Minimalista elegante
       ════════════════════════════════════════════════════════════════ */
    #overlay.estilo_5 #panel {
      background: rgba(248, 248, 248, 0.93);
      border-radius: 6px;
      padding: clamp(22px, 4vh, 56px) clamp(24px, 4.5vw, 72px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.45);
      max-width: 980px;
    }
    #overlay.estilo_5 #cat-titulo {
      color: #1a1a1a;
      font-weight: 300;
      letter-spacing: 0.32em;
      font-size: clamp(1.6rem, 4.5vw, 4rem);
    }
    #overlay.estilo_5 #cat-sep {
      background: #1a1a1a;
      height: 1px;
      width: clamp(40px, 6vw, 90px);
    }
    #overlay.estilo_5 #productos-grid {
      flex-direction: column;
      gap: 0;
      max-width: 820px;
      margin: 0 auto;
    }
    #overlay.estilo_5 #cat-vacia { color: #999; }
    .e5-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      width: 100%;
      padding: clamp(7px, 1.3vh, 15px) 0;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .e5-nombre {
      color: #1a1a1a;
      font-size: clamp(0.95rem, 2vw, 1.7rem);
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .e5-precio {
      color: #777;
      font-size: clamp(0.95rem, 2vw, 1.7rem);
      font-weight: 400;
      white-space: nowrap;
    }

    /* ── Pantalla sin ninguna imagen configurada ── */
    #sin-fondo {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
    }

    #sin-fondo span {
      color: rgba(255,255,255,0.12);
      font-size: clamp(1rem, 4vw, 3rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }
  </style>
</head>
<body data-slug="{{ slug }}">

  <div id="sin-fondo"><span>{{ nombre_negocio }}</span></div>

  <div id="bg"></div>

  <!-- Overlay centrado: panel con título + grid de productos -->
  <div id="overlay" class="estilo_1">
    <div id="panel">
      <div id="cat-titulo"></div>
      <div id="cat-sep"></div>
      <div id="productos-grid"></div>
      <div id="cat-vacia" style="display:none">Sin productos</div>
    </div>
  </div>

  <script>
    const SLUG = document.body.dataset.slug;
    const bgRoot  = document.getElementById('bg');
    const overlay = document.getElementById('overlay');
    const sinFondo = document.getElementById('sin-fondo');

    let capas = [];           // se crea dinámicamente según backgrounds.length

    let estado = {
      pantallas: [],          // array de {capa_idx, categoria_nombre, precio_modo, items[]}
      backgrounds: [],        // array de URL|null (uno por categoría)
      tiempo_rotacion: 10,
      estilo_lista: 'estilo_1',
      indicePantalla: -1,
      capaActiva: -1,
      timerRotacion: null,
    };

    // ── Arranque ──
    cargarDatos().then(() => {
      reconstruirCapas();
      aplicarFondos();
      iniciarRotacion();
    });

    // Refresco silencioso cada 30 s
    setInterval(async () => {
      const tiempoAntes = estado.tiempo_rotacion;
      const numBgsAntes = estado.backgrounds.length;
      await cargarDatos();
      if (estado.backgrounds.length !== numBgsAntes) {
        reconstruirCapas();
      }
      aplicarFondos();
      if (estado.indicePantalla !== -1 && estado.pantallas.length) {
        const idx = Math.min(estado.indicePantalla, estado.pantallas.length - 1);
        estado.indicePantalla = idx;
        renderPantalla(idx);
      }
      if (estado.tiempo_rotacion !== tiempoAntes) {
        clearTimeout(estado.timerRotacion);
        programarSiguiente();
      }
    }, 30000);

    async function cargarDatos() {
      try {
        const r = await fetch(`/api/data/${encodeURIComponent(SLUG)}`);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        estado.pantallas       = d.pantallas      || [];
        estado.backgrounds     = d.backgrounds    || [];
        estado.tiempo_rotacion = d.tiempo_rotacion || 10;
        estado.estilo_lista    = d.estilo_lista   || 'estilo_1';
      } catch (e) {
        console.error('Error al cargar datos:', e);
      }
    }

    function reconstruirCapas() {
      bgRoot.innerHTML = '';
      capas = estado.backgrounds.map((_, i) => {
        const d = document.createElement('div');
        d.className = 'bg-capa';
        d.id = `capa-${i}`;
        bgRoot.appendChild(d);
        return d;
      });
      estado.capaActiva = -1;
    }

    function aplicarFondos() {
      estado.backgrounds.forEach((url, i) => {
        if (capas[i] && url) capas[i].style.backgroundImage = `url('${url}')`;
      });
    }

    function pantallasDisponibles() {
      return estado.pantallas
        .map((p, idx) => ({ pantalla: p, idx }))
        .filter(({ pantalla }) => estado.backgrounds[pantalla.capa_idx] != null);
    }

    function iniciarRotacion() {
      const disp = pantallasDisponibles();
      if (!disp.length) return;
      sinFondo.style.display = 'none';
      mostrarPantalla(disp[0].idx, false);
      if (disp.length > 1) programarSiguiente();
    }

    function mostrarPantalla(pantallaIdx, conFade = true) {
      estado.indicePantalla = pantallaIdx;
      if (conFade) {
        overlay.style.opacity = '0';
        setTimeout(() => {
          cambiarFondo(estado.pantallas[pantallaIdx].capa_idx);
          renderPantalla(pantallaIdx);
          overlay.style.opacity = '1';
        }, 650);
      } else {
        cambiarFondo(estado.pantallas[pantallaIdx].capa_idx);
        renderPantalla(pantallaIdx);
      }
    }

    function cambiarFondo(idx) {
      if (estado.capaActiva !== -1 && estado.capaActiva !== idx && capas[estado.capaActiva]) {
        capas[estado.capaActiva].style.opacity = '0';
      }
      estado.capaActiva = idx;
      if (capas[idx]) capas[idx].style.opacity = '1';
    }

    function aplicarEstilo() {
      const estilo = estado.estilo_lista || 'estilo_1';
      overlay.classList.remove('estilo_1','estilo_2','estilo_3','estilo_4','estilo_5');
      overlay.classList.add(estilo);
    }

    function renderPantalla(pantallaIdx) {
      const pantalla = estado.pantallas[pantallaIdx];
      const titulo = document.getElementById('cat-titulo');
      const sep    = document.getElementById('cat-sep');
      const grid   = document.getElementById('productos-grid');
      const vacia  = document.getElementById('cat-vacia');

      aplicarEstilo();

      if (!pantalla) {
        titulo.textContent  = '';
        sep.style.display   = 'none';
        grid.innerHTML      = '';
        vacia.style.display = 'none';
        return;
      }

      titulo.textContent = pantalla.categoria_nombre;
      sep.style.display  = 'block';

      if (pantalla.items.length === 0) {
        grid.innerHTML      = '';
        vacia.style.display = 'block';
      } else {
        vacia.style.display = 'none';
        const modo   = pantalla.precio_modo || 'usd_fijo';
        const estilo = estado.estilo_lista || 'estilo_1';
        const gen    = GENERADORES[estilo] || GENERADORES.estilo_1;
        grid.innerHTML = pantalla.items.map((it, i) => gen(it, i, modo)).join('');
      }
    }

    // ── Helpers de precio ───────────────────────────────────────────
    // Devuelve {usd, bss}: usd = parte en dólares (o null), bss = string 'Bs ...' (o null)
    function precioInfo(it, modo) {
      let usd = null, bss = null;
      if (modo === 'bss_fijo' || modo === 'usd_a_bss') {
        bss = it.precio_bss || String(it.precio);
      } else if (modo === 'ambos') {
        usd = String(it.precio);
        bss = it.precio_bss || null;
      } else {
        usd = String(it.precio);  // usd_fijo
      }
      return { usd, bss };
    }

    // Precio de un tamaño (estilo pizzería) respetando el modo de la categoría
    function precioTamano(t, modo) {
      if (modo === 'bss_fijo' || modo === 'usd_a_bss') return esc(t.precio_bss || String(t.precio));
      return '$ ' + esc(String(t.precio));
    }

    // Formatea a 2 decimales con coma (para estilo minimalista). 'Consultar' → tal cual.
    function dosDecimales(str) {
      const m = String(str).match(/[+-]?\d+(?:[.,]\d+)?/);
      if (!m) return esc(String(str));
      const n = parseFloat(m[0].replace(',', '.'));
      return n.toFixed(2).replace('.', ',');
    }

    // ── Generadores de HTML por estilo ──────────────────────────────
    const GENERADORES = {
      estilo_1(it, i, modo) {
        const { usd, bss } = precioInfo(it, modo);
        const precio = usd !== null
          ? `$ ${esc(usd)}${bss ? `<span class="bss">${esc(bss)}</span>` : ''}`
          : esc(bss);
        return `<div class="e1-row">
          <span class="e1-nombre">${esc(it.nombre)}</span>
          <span class="e1-dots"></span>
          <span class="e1-precio">${precio}</span>
        </div>`;
      },

      estilo_2(it, i, modo) {
        const { usd, bss } = precioInfo(it, modo);
        const principal = usd !== null
          ? `<div class="e2-precio"><span class="sym">$</span>${esc(usd)}</div>`
          : `<div class="e2-precio">${esc(bss)}</div>`;
        const secundario = (usd !== null && bss) ? `<div class="e2-bss">${esc(bss)}</div>` : '';
        return `<div class="e2-card">
          <div class="e2-nombre">${esc(it.nombre)}</div>
          ${principal}${secundario}
        </div>`;
      },

      estilo_3(it, i, modo) {
        const desc = it.descripcion ? `<div class="e3-desc">${esc(it.descripcion)}</div>` : '';
        let derecha;
        if (it.tamanos && it.tamanos.length) {
          derecha = it.tamanos.map(t => `<div class="e3-size">
            <span class="e3-size-label">${esc(t.etiqueta)}</span>
            <span class="e3-size-precio">${precioTamano(t, modo)}</span>
          </div>`).join('');
        } else {
          const { usd, bss } = precioInfo(it, modo);
          const txt = usd !== null ? `$ ${esc(usd)}` : esc(bss);
          derecha = `<span class="e3-precio">${txt}</span>`;
        }
        return `<div class="e3-row">
          <div class="e3-left">
            <span class="e3-num">${i + 1}</span>
            <div class="e3-info">
              <span class="e3-nombre">${esc(it.nombre)}</span>
              ${desc}
            </div>
          </div>
          <div class="e3-right">${derecha}</div>
        </div>`;
      },

      estilo_4(it, i, modo) {
        const { usd, bss } = precioInfo(it, modo);
        const principal = usd !== null
          ? `<div class="e4-precio"><span class="sym">$</span>${esc(usd)}</div>`
          : `<div class="e4-precio">${esc(bss)}</div>`;
        const secundario = (usd !== null && bss) ? `<div class="e4-bss">${esc(bss)}</div>` : '';
        return `<div class="e4-card">
          <div class="e4-nombre">${esc(it.nombre)}</div>
          <div class="e4-precio-wrap">${principal}${secundario}</div>
        </div>`;
      },

      estilo_5(it, i, modo) {
        const { usd, bss } = precioInfo(it, modo);
        const precio = usd !== null ? `${dosDecimales(usd)} $` : esc(bss);
        return `<div class="e5-row">
          <span class="e5-nombre">${esc(it.nombre)}</span>
          <span class="e5-precio">${precio}</span>
        </div>`;
      },
    };

    function programarSiguiente() {
      clearTimeout(estado.timerRotacion);
      estado.timerRotacion = setTimeout(() => {
        const disp = pantallasDisponibles();
        if (disp.length < 2) return;
        const pos       = disp.findIndex(d => d.idx === estado.indicePantalla);
        const siguiente = disp[(pos + 1) % disp.length];
        mostrarPantalla(siguiente.idx, true);
        programarSiguiente();
      }, estado.tiempo_rotacion * 1000);
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>

</body>
</html>
